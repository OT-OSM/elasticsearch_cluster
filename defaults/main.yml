---
# Static value ####
elasticsearch_version: "9.3.4"
es_series: "9"
es_url: "elasticsearch/elasticsearch-{{ elasticsearch_version }}"
es_service: "elasticsearch.service"
es: "elasticsearch"

# Static value end #####
es_jvm_dump: /var/lib/elasticsearch/heap
data_path: /var/lib/elasticsearch
log_path: /var/log/elasticsearch
es_IP: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
es_seed_hosts_group: "es"
standalone: false

zen_host: >-
  {% set seed_hosts = groups[es_seed_hosts_group] | default(ansible_play_batch) %}
  {{ seed_hosts | map('extract', hostvars, ['ansible_default_ipv4', 'address']) | list | to_json }}

min_heap: "{{ ansible_memtotal_mb // 2 }}m"
max_heap: "{{ ansible_memtotal_mb // 2 }}m"
systemd_path: /usr/lib/systemd/system
conf: /etc/elasticsearch/
key: "{{ key_name }}"
certificate: "{{ certificate_name }}"
certificate_auth: "{{ certificate_authorities_name }}"

# TLS & Security Configuration
tls_enable: true
push_certs: true
es_security_enabled: true
es_enrollment_enabled: true
es_http_ssl_enabled: true
es_transport_ssl_verification_mode: "certificate"

key_name: "node1.key"
certificate_name: "node1.crt"
certificate_authorities_name: "ca.crt"

# User Configuration
es_user: "admin"
es_password: "password123"

# Cluster Configuration
cluster_name: es-cluster
http_port: 9200
tcp_port: 9300

# OS Limits & Tuning
nofile_limit: "65536"
nproc_limit: "5000"
swapness: "1"
vm_max_count: "2621444"
m_lock: false
# ------------------------------------------------------------------------------
# Backup & Snapshot Configuration (Minio/S3)
# ------------------------------------------------------------------------------
es_backup_enabled: true
es_s3_plugin_name: "repository-s3"
es_snapshot_repo_name: "minio_backup"

# Minio Connection Details (Override these in group_vars)
es_minio_endpoint: "minio.example.com:9000"
es_minio_access_key: "demo_access_key"
es_minio_secret_key: "demo_secret_key"
es_minio_bucket: "demo-bucket"
es_minio_protocol: "https"
es_minio_path_style_access: true
