---
- name: Check if custom user exists
  ansible.builtin.shell: "{{ elasticsearch_home }}/bin/elasticsearch-users list | grep -w {{ elasticsearch_user }}"
  register: user_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create custom administrative user
  ansible.builtin.shell: "{{ elasticsearch_home }}/bin/elasticsearch-users useradd {{ elasticsearch_user }} -p {{ elasticsearch_password }} -r {{ elasticsearch_user_roles | join(',') }}"
  when: user_check.rc != 0
  run_once: true
  no_log: true

- name: Add OIDC Client Secret to Elasticsearch Keystore
  ansible.builtin.shell: |
    echo "{{ item.rp_client_secret }}" | {{ elasticsearch_home }}/bin/elasticsearch-keystore add -x -f 'xpack.security.authc.realms.oidc.{{ item.name }}.rp.client_secret'
  with_items: "{{ elasticsearch_oidc_realms }}"
  when: elasticsearch_oidc_enable | bool
  register: keystore_oidc
  changed_when: keystore_oidc.results | selectattr('changed', 'equalto', true) | list | length > 0
  no_log: true
  notify: Restart elasticsearch

- name: Ensure Elasticsearch keystore has correct permissions
  ansible.builtin.file:
    path: "{{ elasticsearch_conf_path }}/elasticsearch.keystore"
    owner: "root"
    group: "elasticsearch"
    mode: '0660'
  when: elasticsearch_oidc_enable | bool

- name: Flush handlers to restart Elasticsearch with new keystore
  ansible.builtin.meta: flush_handlers

- name: Wait for Elasticsearch to be ready for API calls
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ elasticsearch_http_port }}"
    delay: 10
    timeout: 300

- name: Configure OIDC Role Mapping for Keycloak
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_security/role_mapping/oidc_{{ item.name }}_mapping"
    method: POST
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      enabled: true
      roles: ["superuser"]
      rules:
        all:
          - field: { realm.name: "{{ item.name }}" }
    status_code: [200, 201]
    validate_certs: false
  with_items: "{{ elasticsearch_oidc_realms }}"
  when: elasticsearch_oidc_enable | bool
