---
- name: Check if custom user exists
  ansible.builtin.shell: "/usr/share/elasticsearch/bin/elasticsearch-users list | grep -w {{ es_user }}"
  register: user_check
  failed_when: false
  changed_when: false
  run_once: true

- name: Create custom superuser
  ansible.builtin.shell: "/usr/share/elasticsearch/bin/elasticsearch-users useradd {{ es_user }} -p {{ es_password }} -r superuser"
  when: user_check.rc != 0
  run_once: true
  no_log: true
