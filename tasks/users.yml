---
- name: Wait for Elasticsearch to be ready for API calls
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ elasticsearch_http_port }}"
    delay: 10
    timeout: 300

- name: Activate 30-Day Platinum Trial (Required for OIDC/SSO)
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_license/start_trial?acknowledge=true"
    method: POST
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    status_code: [200, 403] # 403 if trial was already used or expired

- name: Configure OIDC Role Mapping for Keycloak
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_security/role_mapping/oidc_{{ item.name }}_mapping"
    method: POST
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      enabled: true
      roles: ["superuser"]
      rules:
        all:
          - field: { realm.name: "{{ item.name }}" }
    status_code: [200, 201]
    validate_certs: false
  with_items: "{{ elasticsearch_oidc_realms }}"
  when: elasticsearch_oidc_enable | bool

- name: Verify OIDC SSO Configuration (Diagnostic)
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_security/oidc/prepare"
    method: POST
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      realm: "{{ elasticsearch_oidc_realms[0].name }}"
    status_code: 200
  register: oidc_check

- name: Display SSO Redirect URL (Verification)
  ansible.builtin.debug:
    msg: "SSO is ACTIVE. Keycloak Redirect URL: {{ oidc_check.json.redirect | default('Configuration/License Error') }}"
  when: oidc_check.json is defined
