---
- name: Ensure Elasticsearch keystore exists
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-keystore create"
    creates: "{{ elasticsearch_conf_path }}/elasticsearch.keystore"

- name: Ensure Elasticsearch keystore has correct permissions
  ansible.builtin.file:
    path: "{{ elasticsearch_conf_path }}/elasticsearch.keystore"
    owner: "{{ elasticsearch_name }}"
    group: "{{ elasticsearch_name }}"
    mode: '0660'

- name: Purge stale OIDC settings from keystore (Required for Clean Boot)
  ansible.builtin.shell: |
    if {{ elasticsearch_home }}/bin/elasticsearch-keystore list | grep -q "xpack.security.authc.realms.oidc.oidc_keycloak.rp.client_secret"; then
      su -s /bin/bash {{ elasticsearch_name }} -c "{{ elasticsearch_home }}/bin/elasticsearch-keystore remove xpack.security.authc.realms.oidc.oidc_keycloak.rp.client_secret"
    fi
  changed_when: false

- name: Check if custom user exists
  ansible.builtin.shell: "{{ elasticsearch_home }}/bin/elasticsearch-users list | grep -w {{ elasticsearch_user }}"
  register: user_check
  failed_when: false
  changed_when: false

- name: Create custom administrative user
  ansible.builtin.shell: "{{ elasticsearch_home }}/bin/elasticsearch-users useradd {{ elasticsearch_user }} -p {{ elasticsearch_password }} -r {{ elasticsearch_user_roles | join(',') }}"
  when: user_check.rc != 0
  no_log: true

- name: Check if Minio credentials are in keystore
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-keystore list"
  register: keystore_list
  changed_when: false
  check_mode: false

- name: Add Minio access key to keystore
  ansible.builtin.shell:
    cmd: 'su -s /bin/bash {{ elasticsearch_name }} -c "echo {{ elasticsearch_minio_access_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin --force s3.client.default.access_key"'
  when: 
    - elasticsearch_backup_enabled | bool
    - "'s3.client.default.access_key' not in keystore_list.stdout"
  no_log: true
  notify: Restart elasticsearch

- name: Add Minio secret key to keystore
  ansible.builtin.shell:
    cmd: 'su -s /bin/bash {{ elasticsearch_name }} -c "echo {{ elasticsearch_minio_secret_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin --force s3.client.default.secret_key"'
  when: 
    - elasticsearch_backup_enabled | bool
    - "'s3.client.default.secret_key' not in keystore_list.stdout"
  no_log: true
  notify: Restart elasticsearch

- name: Final permission check for configuration directory
  ansible.builtin.file:
    path: "{{ elasticsearch_conf_path }}"
    owner: "{{ elasticsearch_name }}"
    group: "{{ elasticsearch_name }}"
    mode: "0770"
    recurse: true
