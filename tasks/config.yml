---
# update environment for elasticsearch
- name: Configure elasticsearch service and environment
  ansible.builtin.template:
    src: "{{ item.name }}"
    dest: "{{ item.path }}"
    mode: "0660"
  with_items:
    - {name: "limit.conf.j2", path: "/etc/security/limits.d/{{ es }}.conf"}
    - {name: "{{ es_service }}.j2", path: "{{ systemd_path }}/{{ es_service }}"}
  notify:
    - reload systemd
    - restart elasticsearch

# update elasticsearch config files
- name: Create elasticsearch configuration files.
  ansible.builtin.template:
    src: "{{ item.name }}"
    dest: "{{ item.path }}"
    owner: "root"
    group: "elasticsearch"
    mode: "0660"
  with_items:
    - { name: 'elasticsearch-9.yml.j2', path: '{{ conf }}elasticsearch.yml' }
    - { name: 'jvm-9.options.j2', path: '{{ conf }}jvm.options' }
  notify:
    - restart elasticsearch

- name: Ensure correct ownership and permissions for configuration directory
  ansible.builtin.file:
    path: "{{ conf }}"
    owner: "root"
    group: "elasticsearch"
    mode: "0770"
    recurse: yes
