---
- name: Get list of available snapshots from {{ elasticsearch_snapshot_repo_name }}
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_snapshot/{{ elasticsearch_snapshot_repo_name }}/_all"
    method: GET
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    status_code: 200
    validate_certs: false
  register: snapshot_list
  when: elasticsearch_snapshot_name == ""

- name: Identify the latest snapshot
  ansible.builtin.set_fact:
    target_snapshot: "{{ elasticsearch_snapshot_name if elasticsearch_snapshot_name != '' else (snapshot_list.json.snapshots | sort(attribute='start_time_in_millis') | last).snapshot }}"

- name: Display the snapshot to be restored
  ansible.builtin.debug:
    msg: "Attempting to restore snapshot: {{ target_snapshot }}"

- name: Restore snapshot from Minio with safety filters
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_snapshot/{{ elasticsearch_snapshot_repo_name }}/{{ target_snapshot }}/_restore"
    method: POST
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      # We exclude hidden system indices (starting with dot) to prevent RED status
      indices: "{{ elasticsearch_restore_indices if elasticsearch_restore_indices != '*' else '*,-.*' }}"
      include_global_state: false
      rename_pattern: "(.+)"
      rename_replacement: "{{ elasticsearch_restore_prefix }}{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}-$1"
    status_code: 200
    validate_certs: false
  register: restore_result

- name: Wait for cluster health to return to yellow or green
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_cluster/health?wait_for_status=yellow&timeout=60s"
    method: GET
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    status_code: 200
    validate_certs: false
  register: health_check
  until: health_check.json.status in ['green', 'yellow']
  retries: 12
  delay: 10

- name: Show final status
  ansible.builtin.debug:
    msg: "Restore complete. Cluster health is {{ health_check.json.status }}."
