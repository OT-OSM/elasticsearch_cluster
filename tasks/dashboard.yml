---
- name: Install OpenSearch Dashboards
  ansible.builtin.apt:
    name: opensearch-dashboards
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Configure OpenSearch Dashboards
  ansible.builtin.template:
    src: opensearch_dashboards.yml.j2
    dest: /etc/opensearch-dashboards/opensearch_dashboards.yml
    owner: opensearch-dashboards
    group: opensearch-dashboards
    mode: "0660"
  notify: Restart opensearch-dashboards

- name: Ensure OpenSearch Dashboards is started and enabled
  ansible.builtin.systemd:
    name: opensearch-dashboards
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for OpenSearch Dashboards to be ready
  ansible.builtin.wait_for:
    port: "{{ elasticsearch_dashboard_port }}"
    delay: 15
    timeout: 600
  register: dashboard_wait
  ignore_errors: yes

- name: Capture Dashboard logs on failure
  ansible.builtin.shell: "tail -n 100 /var/log/opensearch-dashboards/opensearch-dashboards.log"
  when: dashboard_wait.failed | default(false)
  register: dashboard_logs

- name: Fail if Dashboard is not ready
  ansible.builtin.fail:
    msg: "OpenSearch Dashboards failed to start on port {{ elasticsearch_dashboard_port }}. Logs: {{ dashboard_logs.stdout }}"
  when: dashboard_wait.failed | default(false)
