---
- name: Check if repository-s3 plugin is installed
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-plugin list"
  register: installed_plugins
  changed_when: false

- name: Install repository-s3 plugin
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-plugin install {{ elasticsearch_s3_plugin_name }} --batch"
  when: elasticsearch_s3_plugin_name not in installed_plugins.stdout
  notify: Restart elasticsearch

- name: Check if Minio credentials are in keystore
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-keystore list"
  register: keystore_list
  changed_when: false

- name: Add Minio access key to keystore
  ansible.builtin.shell:
    cmd: 'su -s /bin/bash {{ elasticsearch_name }} -c "echo {{ elasticsearch_minio_access_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin --force s3.client.default.access_key"'
  when: "'s3.client.default.access_key' not in keystore_list.stdout"
  notify: Restart elasticsearch

- name: Add Minio secret key to keystore
  ansible.builtin.shell:
    cmd: 'su -s /bin/bash {{ elasticsearch_name }} -c "echo {{ elasticsearch_minio_secret_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin --force s3.client.default.secret_key"'
  when: "'s3.client.default.secret_key' not in keystore_list.stdout"
  notify: Restart elasticsearch

- name: Flush handlers to ensure Elasticsearch is restarted before repo registration
  ansible.builtin.meta: flush_handlers

- name: Verify Minio bucket accessibility (Diagnostic)
  ansible.builtin.shell: |
    curl -I -k "{{ elasticsearch_minio_protocol }}://{{ elasticsearch_minio_endpoint }}/minio/health/live"
  register: bucket_check
  changed_when: false

- name: Debug Minio Bucket Check
  ansible.builtin.debug:
    msg: "Bucket check returned status: {{ bucket_check.stdout_lines[0] if bucket_check.stdout_lines else 'Failed to connect' }}"
  when: bucket_check is failed or '200' not in bucket_check.stdout

- name: Register Minio snapshot repository
  ansible.builtin.uri:
    url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/_snapshot/{{ elasticsearch_snapshot_repo_name }}"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    timeout: 120
    body_format: json
    body:
      type: "s3"
      settings:
        bucket: "{{ elasticsearch_minio_bucket }}"
        client: "default"
        readonly: false
        compress: true
    status_code: [200, 201]
    validate_certs: false
  run_once: true

- name: Create SLM policy for snapshots
  ansible.builtin.uri:
    url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/_slm/policy/{{ elasticsearch_slm_policy_name }}"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    timeout: 120
    body_format: json
    body:
      schedule: "{{ elasticsearch_backup_schedule }}"
      name: "<{{ elasticsearch_slm_policy_name }}-{now/d}>"
      repository: "{{ elasticsearch_snapshot_repo_name }}"
      config:
        indices: "*"
        include_global_state: true
      retention:
        expire_after: "{{ elasticsearch_backup_retention_days }}"
        min_count: "{{ elasticsearch_backup_min_count }}"
        max_count: "{{ elasticsearch_backup_max_count }}"
    status_code: 200
    validate_certs: false
  run_once: true
