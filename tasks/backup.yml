---
- name: Check if repository-s3 plugin is installed
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-plugin list"
  register: installed_plugins
  changed_when: false

- name: Install repository-s3 plugin
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-plugin install {{ elasticsearch_s3_plugin_name }} --batch"
  when: elasticsearch_s3_plugin_name not in installed_plugins.stdout
  notify: Restart elasticsearch

- name: Check if Minio credentials are in keystore
  ansible.builtin.command:
    cmd: "{{ elasticsearch_home }}/bin/elasticsearch-keystore list"
  register: keystore_list
  changed_when: false

- name: Add Minio access key to keystore
  ansible.builtin.shell:
    cmd: "echo {{ elasticsearch_minio_access_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin s3.client.default.access_key"
  when: "'s3.client.default.access_key' not in keystore_list.stdout"
  notify: Restart elasticsearch

- name: Add Minio secret key to keystore
  ansible.builtin.shell:
    cmd: "echo {{ elasticsearch_minio_secret_key }} | {{ elasticsearch_home }}/bin/elasticsearch-keystore add --stdin s3.client.default.secret_key"
  when: "'s3.client.default.secret_key' not in keystore_list.stdout"
  notify: Restart elasticsearch

- name: Flush handlers to ensure Elasticsearch is restarted before repo registration
  ansible.builtin.meta: flush_handlers

- name: Wait for Elasticsearch to be ready on port {{ elasticsearch_http_port }}
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ elasticsearch_http_port }}"
    delay: 10
    timeout: 300

- name: Register Minio snapshot repository
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_snapshot/{{ elasticsearch_snapshot_repo_name }}"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      type: "s3"
      settings:
        bucket: "{{ elasticsearch_minio_bucket }}"
        endpoint: "{{ elasticsearch_minio_endpoint }}"
        protocol: "{{ elasticsearch_minio_protocol }}"
        path_style_access: "{{ elasticsearch_minio_path_style_access }}"
    status_code: 200
    validate_certs: false
  run_once: true

- name: Create SLM policy for snapshots
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ elasticsearch_http_port }}/_slm/policy/{{ elasticsearch_slm_policy_name }}"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      schedule: "0 0 0 * * ?"  # Every day at midnight
      name: "<{{ elasticsearch_slm_policy_name }}-{now/d}>"
      repository: "{{ elasticsearch_snapshot_repo_name }}"
      config:
        indices: "*"
        include_global_state: true
      retention:
        expire_after: "30d"
        min_count: 5
        max_count: 50
    status_code: 200
    validate_certs: false
  run_once: true
