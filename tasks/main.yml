---
# ==============================================================================
# Elasticsearch Main Tasks
# ==============================================================================

# ------------------------------------------------------------------------------
# Phase 1: OS Prerequisites & System Setup
# ------------------------------------------------------------------------------
- name: Configuring common configuration
  ansible.builtin.include_tasks: common.yml

- name: Include OS Specific setup tasks
  ansible.builtin.include_tasks: "es-{{ ansible_os_family }}.yml"

# ------------------------------------------------------------------------------
# Phase 2: Configuration & Security Bootstrapping
# ------------------------------------------------------------------------------
- name: Include configuration tasks
  ansible.builtin.include_tasks: config.yml

- name: Initialize security keystore and users
  ansible.builtin.include_tasks: keystore.yml

- name: Setup MinIO components (Plugins & Keystore)
  ansible.builtin.include_tasks: minio.yml
  when: elasticsearch_backup_enabled | bool

- name: Manage TLS certificates
  ansible.builtin.include_tasks: tls-encryption.yml
  when: elasticsearch_tls_enable | bool

# ------------------------------------------------------------------------------
# Phase 3: Service Startup & Verification
# ------------------------------------------------------------------------------
- name: Ensure {{ elasticsearch_name }} is started
  ansible.builtin.systemd:
    name: "elasticsearch"
    state: started
    enabled: true
    daemon_reload: true

- name: Flush handlers to ensure plugins and configs are applied
  ansible.builtin.meta: flush_handlers

- name: Wait for Elasticsearch API to become ready
  block:
    - name: Wait for port {{ elasticsearch_http_port }}
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ elasticsearch_http_port }}"
        delay: 5
        timeout: 300
  rescue:
    - name: Check Elasticsearch service status
      ansible.builtin.command: systemctl status elasticsearch
      register: service_status
      ignore_errors: true

    - name: Display service status
      ansible.builtin.debug:
        var: service_status.stdout_lines

    - name: Capture last 100 lines of Elasticsearch logs
      ansible.builtin.command: tail -n 100 {{ elasticsearch_log_path }}/{{ elasticsearch_cluster_name }}.log
      register: es_logs
      ignore_errors: true

    - name: Display Elasticsearch logs
      ansible.builtin.debug:
        var: es_logs.stdout_lines

    - name: Fail with detailed information
      ansible.builtin.fail:
        msg: "Elasticsearch failed to start within the timeout. See logs above for details."

# ------------------------------------------------------------------------------
# Phase 4: API-Based Configuration & Health Stabilization
# ------------------------------------------------------------------------------
- name: Post-startup health stabilization
  block:
    - name: Set number_of_replicas to 0 for all indices (Single Node Mode)
      ansible.builtin.uri:
        url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/*,-.*/_settings?allow_no_indices=true&expand_wildcards=all"
        method: PUT
        user: "{{ elasticsearch_user }}"
        password: "{{ elasticsearch_password }}"
        force_basic_auth: true
        body_format: json
        body:
          index:
            number_of_replicas: 0
        status_code: [200, 400, 404]
        validate_certs: false
      failed_when: false

    - name: Force retry failed shard allocations
      ansible.builtin.uri:
        url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/_cluster/reroute?retry_failed=true"
        method: POST
        user: "{{ elasticsearch_user }}"
        password: "{{ elasticsearch_password }}"
        force_basic_auth: true
        status_code: [200, 400]
        validate_certs: false
      failed_when: false
  when: elasticsearch_standalone | bool or elasticsearch_optimize_single_node | bool

- name: Force shard allocation (Bypass Disk Watermarks for Lab speed)
  ansible.builtin.uri:
    url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/_cluster/settings"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      persistent:
        cluster.routing.allocation.disk.threshold_enabled: false
    status_code: [200, 400]
    validate_certs: false
  when: elasticsearch_optimize_single_node | bool
  failed_when: false

- name: Explicitly enable X-Pack Monitoring collection (Required for Metrics)
  ansible.builtin.uri:
    url: "{{ elasticsearch_api_protocol }}://{{ elasticsearch_api_host }}:{{ elasticsearch_http_port }}/_cluster/settings"
    method: PUT
    user: "{{ elasticsearch_user }}"
    password: "{{ elasticsearch_password }}"
    force_basic_auth: true
    body_format: json
    body:
      persistent:
        xpack.monitoring.collection.enabled: true
    status_code: [200, 400]
    validate_certs: false
  when: elasticsearch_metrics_enabled | bool
  failed_when: false

- name: Configure security API settings (Users, Trials, SSO)
  ansible.builtin.include_tasks: security_api.yml
   when: elasticsearch_security_enabled | bool
   
- name: Deploy Prometheus Elasticsearch Exporter (Exposes metrics at :9114/metrics)
  ansible.builtin.include_tasks: exporter.yml
  when: elasticsearch_metrics_enabled | bool

- name: Configure Index Lifecycle Management (ILM)
  ansible.builtin.include_tasks: ilm.yml
  when: elasticsearch_ilm_enabled | bool

# ------------------------------------------------------------------------------
# Phase 5: Backup & Restore Operations
# ------------------------------------------------------------------------------
- name: Integrate Minio Backup
  ansible.builtin.include_tasks: backup.yml
  when: elasticsearch_backup_enabled | bool

- name: Restore Data from Minio
  ansible.builtin.include_tasks: restore.yml
  when: elasticsearch_restore_enable | bool

